name: Prepare Firefox Release Artifacts
description: Restore or create AMO-signed Firefox Release artifacts for Debian packaging.

inputs:
  amo-version:
    description: Optional AMO extension version override to use when signing is required. Defaults to a stable version derived from the Firefox Release payload hash.
    required: false
    default: ''
  web-ext-api-key:
    description: AMO web-ext API key.
    required: true
  web-ext-api-secret:
    description: AMO web-ext API secret.
    required: true
  approval-timeout-seconds:
    description: Maximum time web-ext should wait for AMO approval.
    required: false
    default: '1200'
  total-timeout-seconds:
    description: Maximum total wall-clock time for AMO signing and signed XPI recovery.
    required: false
    default: '1800'
  process-timeout-buffer-seconds:
    description: Extra parent-process timeout buffer beyond web-ext approval timeout.
    required: false
    default: '120'
  max-throttle-wait-seconds:
    description: Maximum AMO throttle delay that should be retried.
    required: false
    default: '2700'
  max-retries:
    description: Maximum number of AMO signing retries.
    required: false
    default: '2'
  retry-buffer-seconds:
    description: Extra buffer before retrying an AMO throttle response.
    required: false
    default: '30'
  sign-on-cache-miss:
    description: Whether to sign with AMO when signed artifacts are not restored from cache.
    required: false
    default: 'true'
  require-signed-artifacts:
    description: Whether this action should fail when signed artifacts are unavailable.
    required: false
    default: 'true'

outputs:
  payload-hash:
    description: Firefox Release runtime payload hash.
    value: ${{ steps.payload.outputs.hash }}
  cache-hit:
    description: Whether signed Firefox Release artifacts were restored from cache.
    value: ${{ steps.cache.outputs.cache-hit }}
  artifact-source:
    description: 'Source of the Firefox Release artifacts: cache, signed, skipped, manual-review-required, timeout, or hard-failure.'
    value: ${{ steps.status.outputs.artifact-source }}
  release-state:
    description: 'Actionable Firefox Release state: cache-hit, fresh-signing, skipped, manual-review-required, timeout, or hard-failure.'
    value: ${{ steps.status.outputs.release-state }}
  amo-version:
    description: AMO extension version used when signing is required.
    value: ${{ steps.amo-version.outputs.version }}
  amo-file-status:
    description: Last AMO file.status observed by signing recovery, when available.
    value: ${{ steps.status.outputs.amo-file-status }}
  signed-artifacts-present:
    description: Whether verified signed Firefox Release artifacts are present.
    value: ${{ steps.status.outputs.signed-artifacts-present }}

runs:
  using: composite
  steps:
    - name: Compute Firefox Release payload hash
      id: payload
      shell: bash
      run: |
        hash="$(node firefox-extension/firefox-release-payload-hash.mjs)"
        echo "hash=$hash" >> "$GITHUB_OUTPUT"
        echo "Firefox Release payload hash: $hash"

    - name: Resolve Firefox Release AMO version
      id: amo-version
      shell: bash
      env:
        AMO_VERSION_OVERRIDE: ${{ inputs.amo-version }}
      run: |
        if [ -n "$AMO_VERSION_OVERRIDE" ]; then
          version="$AMO_VERSION_OVERRIDE"
        else
          version="$(node firefox-extension/firefox-release-amo-version.mjs --payload-hash "${{ steps.payload.outputs.hash }}")"
        fi

        echo "version=$version" >> "$GITHUB_OUTPUT"
        echo "Firefox Release AMO version: $version"

    - name: Restore signed Firefox Release artifacts
      id: cache
      uses: actions/cache/restore@v5
      with:
        path: firefox-extension/build/firefox-release
        key: openpath-firefox-release-${{ steps.payload.outputs.hash }}

    - name: Verify cached Firefox Release artifacts
      if: ${{ steps.cache.outputs.cache-hit == 'true' }}
      shell: bash
      run: |
        node firefox-extension/verify-firefox-release-artifacts.mjs \
          --release-dir firefox-extension/build/firefox-release \
          --payload-hash "${{ steps.payload.outputs.hash }}"

    - name: Sign Firefox Release Extension
      id: sign-firefox-release
      if: ${{ steps.cache.outputs.cache-hit != 'true' && inputs.sign-on-cache-miss == 'true' }}
      continue-on-error: true
      shell: bash
      env:
        WEB_EXT_API_KEY: ${{ inputs.web-ext-api-key }}
        WEB_EXT_API_SECRET: ${{ inputs.web-ext-api-secret }}
        WEB_EXT_SIGN_SOURCE_CODE_ARCHIVE: ${{ github.workspace }}/firefox-extension/build/firefox-source-submission/openpath-firefox-source.zip
        WEB_EXT_AMO_METADATA: ${{ github.workspace }}/firefox-extension/amo-review-metadata.json
        WEB_EXT_SIGN_MAX_RETRIES: ${{ inputs.max-retries }}
        WEB_EXT_SIGN_RETRY_BUFFER_SECONDS: ${{ inputs.retry-buffer-seconds }}
        WEB_EXT_SIGN_MAX_THROTTLE_WAIT_SECONDS: ${{ inputs.max-throttle-wait-seconds }}
        WEB_EXT_SIGN_APPROVAL_TIMEOUT_SECONDS: ${{ inputs.approval-timeout-seconds }}
        WEB_EXT_SIGN_TOTAL_TIMEOUT_SECONDS: ${{ inputs.total-timeout-seconds }}
        WEB_EXT_SIGN_PROCESS_TIMEOUT_BUFFER_SECONDS: ${{ inputs.process-timeout-buffer-seconds }}
      run: |
        npm run build:firefox-source --workspace=@openpath/firefox-extension
        npm run verify:amo-submission --workspace=@openpath/firefox-extension
        npm run sign:firefox-release --workspace=@openpath/firefox-extension -- --version "${{ steps.amo-version.outputs.version }}"

    - name: Verify signed Firefox Release artifacts
      if: ${{ steps.cache.outputs.cache-hit != 'true' && inputs.sign-on-cache-miss == 'true' && steps.sign-firefox-release.outcome == 'success' }}
      shell: bash
      run: |
        node firefox-extension/verify-firefox-release-artifacts.mjs \
          --release-dir firefox-extension/build/firefox-release \
          --payload-hash "${{ steps.payload.outputs.hash }}"

    - name: Save signed Firefox Release artifacts
      if: ${{ steps.cache.outputs.cache-hit != 'true' && inputs.sign-on-cache-miss == 'true' && steps.sign-firefox-release.outcome == 'success' }}
      continue-on-error: true
      uses: actions/cache/save@v5
      with:
        path: firefox-extension/build/firefox-release
        key: openpath-firefox-release-${{ steps.payload.outputs.hash }}

    - name: Skip AMO signing on cache miss
      if: ${{ steps.cache.outputs.cache-hit != 'true' && inputs.sign-on-cache-miss != 'true' }}
      shell: bash
      run: |
        echo "::notice title=Skipping AMO signing::Signed Firefox Release artifacts were not found in cache. Continuing without AMO because sign-on-cache-miss is false."

    - name: Report Firefox Release artifact status
      id: status
      if: ${{ always() }}
      shell: bash
      run: |
        release_dir="firefox-extension/build/firefox-release"
        signing_state_file="firefox-extension/build/firefox-release-signing/amo-signing-state.json"
        sign_outcome="${{ steps.sign-firefox-release.outcome }}"
        signing_state=""
        amo_file_status=""
        state_message=""

        if [ -f "$signing_state_file" ]; then
          signing_state="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(data.state || ''));" "$signing_state_file")"
          amo_file_status="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(data.fileStatus || ''));" "$signing_state_file")"
          state_message="$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync(process.argv[1], 'utf8')); process.stdout.write(String(data.message || ''));" "$signing_state_file")"
        fi

        if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
          artifact_source="cache"
          release_state="cache-hit"
          signed_artifacts_present="true"
        elif [ -f "$release_dir/metadata.json" ] && [ -f "$release_dir/openpath-firefox-extension.xpi" ]; then
          artifact_source="signed"
          release_state="fresh-signing"
          signed_artifacts_present="true"
        elif [ "$signing_state" = "manual-review-required" ]; then
          artifact_source="manual-review-required"
          release_state="manual-review-required"
          signed_artifacts_present="false"
        elif [ "$signing_state" = "timeout" ]; then
          artifact_source="timeout"
          release_state="timeout"
          signed_artifacts_present="false"
        elif [ "$signing_state" = "hard-failure" ] || [ "$sign_outcome" = "failure" ]; then
          artifact_source="hard-failure"
          release_state="hard-failure"
          signed_artifacts_present="false"
        else
          artifact_source="skipped"
          release_state="skipped"
          signed_artifacts_present="false"
        fi

        echo "artifact-source=$artifact_source" >> "$GITHUB_OUTPUT"
        echo "release-state=$release_state" >> "$GITHUB_OUTPUT"
        echo "amo-file-status=$amo_file_status" >> "$GITHUB_OUTPUT"
        echo "signed-artifacts-present=$signed_artifacts_present" >> "$GITHUB_OUTPUT"
        echo "Firefox Release artifact source: $artifact_source"
        echo "Firefox Release state: $release_state"
        echo "Firefox Release signing step outcome: $sign_outcome"
        if [ -n "$amo_file_status" ]; then
          echo "AMO fileStatus=$amo_file_status"
        fi
        if [ -n "$state_message" ]; then
          echo "AMO signing state message: $state_message"
        fi
        echo "Signed Firefox Release artifacts present: $signed_artifacts_present"

    - name: Require actionable Firefox Release state
      if: ${{ always() && ((inputs.sign-on-cache-miss == 'true' && steps.sign-firefox-release.outcome == 'failure') || (inputs.require-signed-artifacts == 'true' && steps.status.outputs.signed-artifacts-present != 'true')) }}
      shell: bash
      run: |
        case "${{ steps.status.outputs.release-state }}" in
          manual-review-required)
            echo "::error title=Manual AMO review required::AMO accepted the Firefox Release submission, but fileStatus=unreviewed did not produce signed artifacts before the recovery timeout. Review the AMO version manually or rerun with an explicit amo-version after review."
            ;;
          timeout)
            echo "::error title=AMO signing timeout::Firefox Release AMO signing timed out before signed artifacts were available."
            ;;
          hard-failure)
            echo "::error title=AMO signing hard failure::Firefox Release AMO signing failed before signed artifacts were available."
            ;;
          *)
            echo "::error title=Missing signed Firefox Release artifacts::Signed Firefox Release artifacts are required but were not restored or created."
            ;;
        esac
        exit 1
