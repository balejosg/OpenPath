name: WEDU Gateway Healthcheck

on:
  workflow_dispatch:
  schedule:
    - cron: '7 * * * *'

permissions:
  contents: read

concurrency:
  group: wedu-captive-portal-lab-${{ github.repository }}
  cancel-in-progress: false

jobs:
  gateway-healthcheck:
    name: WEDU gateway healthcheck
    runs-on: [self-hosted, Linux, X64, proxmox, openpath]
    timeout-minutes: 10
    env:
      OPENPATH_WEDU_CI_ARTIFACT_DIR: .opencode/tmp/wedu-gateway-healthcheck/${{ github.run_id }}-${{ github.run_attempt }}
      OPENPATH_WEDU_CI_PROXMOX_HOST: ${{ secrets.OPENPATH_WEDU_CI_PROXMOX_HOST || vars.OPENPATH_WEDU_CI_PROXMOX_HOST || 'whitelist-proxmox' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Configure Proxmox SSH identity
        shell: bash
        env:
          OPENPATH_WEDU_CI_SSH_PRIVATE_KEY: ${{ secrets.OPENPATH_WEDU_CI_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${OPENPATH_WEDU_CI_SSH_PRIVATE_KEY:-}" ]; then
            exit 0
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          key_path="$HOME/.ssh/openpath-wedu-ci"
          printf '%s\n' "$OPENPATH_WEDU_CI_SSH_PRIVATE_KEY" > "$key_path"
          chmod 600 "$key_path"
          echo "OPENPATH_WEDU_CI_SSH_KEY_PATH=$key_path" >> "$GITHUB_ENV"

      - name: Run WEDU gateway healthcheck
        shell: bash
        run: bash scripts/wedu-captive-portal-gateway-healthcheck.sh

      - name: Upload WEDU gateway healthcheck artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: wedu-gateway-healthcheck-${{ github.run_id }}-${{ github.run_attempt }}
          path: .opencode/tmp/wedu-gateway-healthcheck/${{ github.run_id }}-${{ github.run_attempt }}/
          if-no-files-found: warn
